<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Login | Panorama Corporativo</title>
  </head>
  <body
    x-data="{ ...createAppShell('login'), email: '', senha: '' }"
    :class="{'dark bg-gray-900': darkMode === true}"
    class="flex items-center justify-center min-h-screen bg-gray-50"
  >
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-200 p-8 dark:bg-gray-800 dark:border-gray-700">
      <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-gray-800 dark:text-white">Bem-vindo de volta</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">Faça login para acessar o painel corporativo.</p>
      </div>

      <form @submit.prevent="realizarLogin(email, senha)" class="space-y-5">
        <div>
          <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">E-mail</label>
          <input x-model="email" type="email" required class="w-full rounded-lg border border-gray-300 bg-transparent px-4 py-3 text-sm text-gray-800 placeholder-gray-400 focus:border-brand-500 focus:ring-brand-500 dark:border-gray-700 dark:text-white dark:focus:border-brand-500" placeholder="Digite seu e-mail" />
        </div>

        <div>
          <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">Senha</label>
          <input x-model="senha" type="password" required class="w-full rounded-lg border border-gray-300 bg-transparent px-4 py-3 text-sm text-gray-800 placeholder-gray-400 focus:border-brand-500 focus:ring-brand-500 dark:border-gray-700 dark:text-white dark:focus:border-brand-500" placeholder="Digite sua senha" />
        </div>

        <button type="submit" class="w-full rounded-lg bg-brand-500 px-4 py-3 text-sm font-medium text-white transition hover:bg-brand-600 focus:outline-none focus:ring-4 focus:ring-brand-500/20" style="background-color: #3b82f6;">
          Entrar
        </button>
      </form>
    </div>
  </body>
</html>
