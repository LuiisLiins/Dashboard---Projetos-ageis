<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Dashboard Operacional | Dashboard Multidominio</title>
  </head>
  <body
    x-data="createAppShell('operacional')"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <include src="./partials/preloader.html"></include>

    <div class="flex h-screen overflow-hidden">
      <include src="./partials/sidebar.html"></include>

      <div
        class="relative flex flex-1 flex-col overflow-x-hidden overflow-y-auto"
      >
        <include src="./partials/overlay.html" />
        <include src="./partials/header.html" />

        <main>
          <div class="mx-auto max-w-(--breakpoint-2xl) p-4 md:p-6">
            <include src="./partials/dashboard/page-header.html"></include>

            <section class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
              <div
                class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="flex items-center justify-between">
                  <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Pedidos em Andamento</span>
                  <span class="flex h-8 w-8 items-center justify-center rounded-full bg-warning-50 text-warning-600 dark:bg-warning-500/15 dark:text-warning-300">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                  </span>
                </div>
                <div class="mt-4 flex items-end justify-between">
                  <div>
                    <h4 class="text-2xl font-bold text-gray-800 dark:text-white/90">142</h4>
                    <span class="text-sm text-gray-500 mt-1 flex items-center gap-1">Em execução nas linhas</span>
                  </div>
                </div>
              </div>

              <div
                class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="flex items-center justify-between">
                  <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Pedidos Concluídos</span>
                  <span class="flex h-8 w-8 items-center justify-center rounded-full bg-success-50 text-success-600 dark:bg-success-500/15 dark:text-success-300">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                  </span>
                </div>
                <div class="mt-4 flex items-end justify-between">
                  <div>
                    <h4 class="text-2xl font-bold text-gray-800 dark:text-white/90">845</h4>
                    <span class="text-sm text-success-500 mt-1 flex items-center gap-1">+12% vs ontem</span>
                  </div>
                </div>
              </div>

              <div
                class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="flex items-center justify-between">
                  <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Pendências</span>
                  <span class="flex h-8 w-8 items-center justify-center rounded-full bg-error-50 text-error-600 dark:bg-error-500/15 dark:text-error-300">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                  </span>
                </div>
                <div class="mt-4 flex items-end justify-between">
                  <div>
                    <h4 class="text-2xl font-bold text-gray-800 dark:text-white/90">18</h4>
                    <span class="text-sm text-error-500 mt-1 flex items-center gap-1">Exigem atenção</span>
                  </div>
                </div>
              </div>

              <div
                class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="flex items-center justify-between">
                  <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Tempo Médio (TMA)</span>
                  <span class="flex h-8 w-8 items-center justify-center rounded-full bg-brand-50 text-brand-600 dark:bg-brand-500/15 dark:text-brand-300">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                  </span>
                </div>
                <div class="mt-4 flex items-end justify-between">
                  <div>
                    <h4 class="text-2xl font-bold text-gray-800 dark:text-white/90">45m</h4>
                    <span class="text-sm text-success-500 mt-1 flex items-center gap-1">-5m vs semana passada</span>
                  </div>
                </div>
              </div>
            </section>

            <section class="mt-6 grid gap-4 xl:grid-cols-2">
              <div
                class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="mb-4 flex items-center justify-between">
                  <div>
                    <h3
                      class="text-lg font-semibold text-gray-800 dark:text-white/90"
                    >
                      Fluxo Diário
                    </h3>
                  </div>
                </div>
                <div class="max-w-full overflow-x-auto custom-scrollbar">
                  <div id="chartOne" class="min-w-[400px]"></div>
                </div>
              </div>

              <div
                class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="mb-4 flex items-center justify-between">
                  <div>
                    <h3
                      class="text-lg font-semibold text-gray-800 dark:text-white/90"
                    >
                      Status em Tempo Real
                    </h3>
                  </div>
                </div>
                <div class="max-w-full overflow-x-auto custom-scrollbar">
                  <div id="chartTwo" class="min-w-[400px]"></div>
                </div>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
