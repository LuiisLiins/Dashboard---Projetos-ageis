<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Perfil | Panorama Corporativo</title>
  </head>
  <body
    x-data="createAppShell('profile')"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <include src="./partials/preloader.html"></include>

    <div class="flex h-screen overflow-hidden">
      <include src="./partials/sidebar.html"></include>

      <div class="relative flex flex-1 flex-col overflow-x-hidden overflow-y-auto">
        <include src="./partials/overlay.html" />
        <include src="./partials/header.html" />

        <main>
          <div class="mx-auto max-w-(--breakpoint-2xl) p-4 md:p-6">
            <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
              <h2 class="text-2xl font-bold text-gray-800 dark:text-white/90">Meu Perfil</h2>
            </div>

            <div class="grid grid-cols-5 gap-8">
              <div class="col-span-5 xl:col-span-3">
                <div class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]">
                  <div class="border-b border-gray-200 py-4 px-6 dark:border-gray-800">
                    <h3 class="font-semibold text-gray-800 dark:text-white/90">Informações Pessoais</h3>
                  </div>
                  <div class="p-6">
                    <form @submit.prevent="updateProfile()">
                      <div class="mb-5 flex flex-col gap-5 sm:flex-row">
                        <div class="w-full sm:w-1/2">
                          <label class="mb-2 block text-sm font-medium text-gray-700 dark:text-gray-300">Nome</label>
                          <input x-model="profileData.nome" type="text" required class="w-full rounded-lg border border-gray-300 bg-transparent px-4 py-3 text-sm text-gray-800 placeholder-gray-400 focus:border-brand-500 focus:ring-brand-500 dark:border-gray-700 dark:text-white" />
                        </div>

                        <div class="w-full sm:w-1/2">
                          <label class="mb-2 block text-sm font-medium text-gray-700 dark:text-gray-300">E-mail</label>
                          <input x-model="profileData.email" type="email" required class="w-full rounded-lg border border-gray-300 bg-transparent px-4 py-3 text-sm text-gray-800 placeholder-gray-400 focus:border-brand-500 focus:ring-brand-500 dark:border-gray-700 dark:text-white" />
                        </div>
                      </div>

                      <div class="mb-5">
                        <label class="mb-2 block text-sm font-medium text-gray-700 dark:text-gray-300">Nova Senha</label>
                        <input x-model="profileData.senha" type="password" class="w-full rounded-lg border border-gray-300 bg-transparent px-4 py-3 text-sm text-gray-800 placeholder-gray-400 focus:border-brand-500 focus:ring-brand-500 dark:border-gray-700 dark:text-white" placeholder="Deixe em branco para não alterar" />
                        <span class="mt-1 block text-xs text-gray-500 dark:text-gray-400">A senha deve ter no mínimo 8 caracteres.</span>
                      </div>

                      <div class="flex justify-end gap-4 mt-8">
                        <button type="submit" class="rounded-lg bg-brand-500 px-6 py-3 text-sm font-medium text-white transition hover:bg-brand-600 focus:outline-none focus:ring-4 focus:ring-brand-500/20" style="background-color: #3b82f6;">
                          Salvar Alterações
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
