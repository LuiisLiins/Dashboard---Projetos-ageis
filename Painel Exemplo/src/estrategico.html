<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Dashboard Estratégico | Dashboard Multidominio</title>
  </head>
  <body
    x-data="createAppShell('estrategico')"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <include src="./partials/preloader.html"></include>

    <div class="flex h-screen overflow-hidden">
      <include src="./partials/sidebar.html"></include>

      <div
        class="relative flex flex-1 flex-col overflow-x-hidden overflow-y-auto"
      >
        <include src="./partials/overlay.html" />
        <include src="./partials/header.html" />

        <main>
          <div class="mx-auto max-w-(--breakpoint-2xl) p-4 md:p-6">
            <include src="./partials/dashboard/page-header.html"></include>

            <section class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
              <div
                class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="flex items-center justify-between">
                  <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Receita Acumulada</span>
                  <span class="flex h-8 w-8 items-center justify-center rounded-full bg-success-50 text-success-600 dark:bg-success-500/15 dark:text-success-300">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                  </span>
                </div>
                <div class="mt-4 flex items-end justify-between">
                  <div>
                    <h4 class="text-2xl font-bold text-gray-800 dark:text-white/90">R$ <span x-text="dashboardData.kpis.receita_ytd !== undefined ? dashboardData.kpis.receita_ytd.toLocaleString('pt-BR', {minimumFractionDigits: 2}) : '0,00'"></span></h4>
                    <span class="text-sm text-success-500 mt-1 flex items-center gap-1">+18% YTD</span>
                  </div>
                </div>
              </div>

              <div
                class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="flex items-center justify-between">
                  <span class="text-sm font-medium text-gray-500 dark:text-gray-400 flex items-center gap-1">
                    Ticket Médio
                    <button @click.prevent="$dispatch('open-info-modal', { term: 'Ticket Médio', description: 'Valor médio que cada cliente gasta em suas compras. É calculado dividindo a receita total pelo número de vendas.' })" class="text-gray-400 hover:text-brand-500 transition-colors">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    </button>
                  </span>
                  <span class="flex h-8 w-8 items-center justify-center rounded-full bg-brand-50 text-brand-600 dark:bg-brand-500/15 dark:text-brand-300">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="M7 15h0M2 9.5h20"></path></svg>
                  </span>
                </div>
                <div class="mt-4 flex items-end justify-between">
                  <div>
                    <h4 class="text-2xl font-bold text-gray-800 dark:text-white/90">R$ <span x-text="dashboardData.kpis.ticket_medio_geral !== undefined ? dashboardData.kpis.ticket_medio_geral.toLocaleString('pt-BR', {minimumFractionDigits: 2}) : '0,00'"></span></h4>
                    <span class="text-sm text-success-500 mt-1 flex items-center gap-1">+5.2% vs ano passado</span>
                  </div>
                </div>
              </div>

              <div
                class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="flex items-center justify-between">
                  <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Taxa de Crescimento</span>
                  <span class="flex h-8 w-8 items-center justify-center rounded-full bg-blue-50 text-blue-600 dark:bg-blue-500/15 dark:text-blue-300">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                  </span>
                </div>
                <div class="mt-4 flex items-end justify-between">
                  <div>
                    <h4 class="text-2xl font-bold text-gray-800 dark:text-white/90"><span x-text="dashboardData.kpis.taxa_crescimento || '24.8'"></span>%</h4>
                    <span class="text-sm text-success-500 mt-1 flex items-center gap-1">Acima da meta (20%)</span>
                  </div>
                </div>
              </div>

              <div
                class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="flex items-center justify-between">
                  <span class="text-sm font-medium text-gray-500 dark:text-gray-400 flex items-center gap-1">
                    ROI
                    <button @click.prevent="$dispatch('open-info-modal', { term: 'ROI (Retorno Sobre Investimento)', description: 'Métrica que indica o quanto a empresa ganhou ou perdeu em relação ao valor investido inicialmente.' })" class="text-gray-400 hover:text-brand-500 transition-colors">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    </button>
                  </span>
                  <span class="flex h-8 w-8 items-center justify-center rounded-full bg-warning-50 text-warning-600 dark:bg-warning-500/15 dark:text-warning-300">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"></path><path d="M12 18V6"></path></svg>
                  </span>
                </div>
                <div class="mt-4 flex items-end justify-between">
                  <div>
                    <h4 class="text-2xl font-bold text-gray-800 dark:text-white/90"><span x-text="dashboardData.kpis.roi || '0'"></span>%</h4>
                    <span class="text-sm text-success-500 mt-1 flex items-center gap-1">Excelente</span>
                  </div>
                </div>
              </div>
            </section>

            <section class="mt-6 grid gap-4 xl:grid-cols-2">
              <div
                class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="mb-4 flex items-center justify-between">
                  <div>
                    <h3
                      class="text-lg font-semibold text-gray-800 dark:text-white/90"
                    >
                      Crescimento Anual
                    </h3>
                  </div>
                </div>
                <div class="max-w-full overflow-x-auto custom-scrollbar">
                  <div id="chartOne" class="min-w-[400px]"></div>
                </div>
              </div>

              <div
                class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="mb-4 flex items-center justify-between">
                  <div>
                    <h3
                      class="text-lg font-semibold text-gray-800 dark:text-white/90"
                    >
                      Desempenho Geral
                    </h3>
                  </div>
                </div>
                <div class="max-w-full overflow-x-auto custom-scrollbar">
                  <div id="chartThree" class="min-w-[400px]"></div>
                </div>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
