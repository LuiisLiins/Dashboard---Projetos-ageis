<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Dashboard Clientes | Dashboard Multidominio</title>
  </head>
  <body
    x-data="createAppShell('clientes')"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <include src="./partials/preloader.html"></include>

    <div class="flex h-screen overflow-hidden">
      <include src="./partials/sidebar.html"></include>

      <div
        class="relative flex flex-1 flex-col overflow-x-hidden overflow-y-auto"
      >
        <include src="./partials/overlay.html" />
        <include src="./partials/header.html" />

        <main>
          <div class="mx-auto max-w-(--breakpoint-2xl) p-4 md:p-6">
            <include src="./partials/dashboard/page-header.html"></include>

            <section class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
              <div
                class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="flex items-center justify-between">
                  <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Total de Clientes</span>
                  <span class="flex h-8 w-8 items-center justify-center rounded-full bg-brand-50 text-brand-600 dark:bg-brand-500/15 dark:text-brand-300">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                  </span>
                </div>
                <div class="mt-4 flex items-end justify-between">
                  <div>
                    <h4 class="text-2xl font-bold text-gray-800 dark:text-white/90">1.254</h4>
                    <span class="text-sm text-success-500 mt-1 flex items-center gap-1">+12% este ano</span>
                  </div>
                </div>
              </div>

              <div
                class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="flex items-center justify-between">
                  <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Clientes Novos (Mês)</span>
                  <span class="flex h-8 w-8 items-center justify-center rounded-full bg-success-50 text-success-600 dark:bg-success-500/15 dark:text-success-300">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                  </span>
                </div>
                <div class="mt-4 flex items-end justify-between">
                  <div>
                    <h4 class="text-2xl font-bold text-gray-800 dark:text-white/90">84</h4>
                    <span class="text-sm text-success-500 mt-1 flex items-center gap-1">+5% vs meta</span>
                  </div>
                </div>
              </div>

              <div
                class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="flex items-center justify-between">
                  <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Custo de Aquisição (CAC)</span>
                  <span class="flex h-8 w-8 items-center justify-center rounded-full bg-warning-50 text-warning-600 dark:bg-warning-500/15 dark:text-warning-300">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                  </span>
                </div>
                <div class="mt-4 flex items-end justify-between">
                  <div>
                    <h4 class="text-2xl font-bold text-gray-800 dark:text-white/90">R$ 150,00</h4>
                    <span class="text-sm text-warning-500 mt-1 flex items-center gap-1">LTV/CAC: 3.5x</span>
                  </div>
                </div>
              </div>

              <div
                class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="flex items-center justify-between">
                  <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Churn Rate</span>
                  <span class="flex h-8 w-8 items-center justify-center rounded-full bg-error-50 text-error-600 dark:bg-error-500/15 dark:text-error-300">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                  </span>
                </div>
                <div class="mt-4 flex items-end justify-between">
                  <div>
                    <h4 class="text-2xl font-bold text-gray-800 dark:text-white/90">2.1%</h4>
                    <span class="text-sm text-error-500 mt-1 flex items-center gap-1 text-red-500">+0.5% este mês</span>
                  </div>
                </div>
              </div>
            </section>

            <section class="mt-6 grid gap-4 xl:grid-cols-2">
              <div
                class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="mb-4 flex items-center justify-between">
                  <div>
                    <h3
                      class="text-lg font-semibold text-gray-800 dark:text-white/90"
                    >
                      Crescimento da Base de Clientes
                    </h3>
                  </div>
                </div>
                <div class="max-w-full overflow-x-auto custom-scrollbar">
                  <div id="chartThree" class="min-w-[400px]"></div>
                </div>
              </div>

              <div
                class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="mb-4 flex items-center justify-between">
                  <div>
                    <h3
                      class="text-lg font-semibold text-gray-800 dark:text-white/90"
                    >
                      Perfil Demográfico (Região)
                    </h3>
                  </div>
                </div>
                <div class="max-w-full overflow-x-auto custom-scrollbar">
                  <div id="chartOne" class="min-w-[400px]"></div>
                </div>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
