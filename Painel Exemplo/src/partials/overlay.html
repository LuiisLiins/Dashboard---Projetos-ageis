<div
  @click="sidebarToggle = false"
  :class="sidebarToggle ? 'block lg:hidden' : 'hidden'"
  class="fixed w-full h-screen z-9 bg-gray-900/50"
></div>

<div
  x-data="{
    isOpen: false,
    term: '',
    description: '',
    openModal(data) {
      this.term = data.term;
      this.description = data.description;
      this.isOpen = true;
    }
  }"
  @open-info-modal.window="openModal($event.detail)"
  x-show="isOpen"
  class="fixed inset-0 z-[999999] flex items-center justify-center bg-black/50 px-4 backdrop-blur-sm"
  style="display: none;"
>
  <div
    @click.outside="isOpen = false"
    class="w-full max-w-md rounded-2xl bg-white p-6 shadow-theme-lg dark:bg-gray-900 dark:border dark:border-gray-800"
  >
    <div class="flex items-center justify-between mb-4 border-b border-gray-100 pb-3 dark:border-gray-800">
      <h3
        class="text-xl font-semibold text-gray-800 dark:text-white/90"
        x-text="term"
      ></h3>
      <button
        @click="isOpen = false"
        class="text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white"
      >
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </button>
    </div>
    <p class="text-sm text-gray-600 dark:text-gray-400 leading-relaxed" x-text="description"></p>
    
    <div class="mt-6 flex justify-end">
      <button
        @click="isOpen = false"
        class="rounded-lg bg-brand-500 px-5 py-2.5 text-sm font-medium text-white hover:bg-brand-600 focus:ring-4 focus:ring-brand-500/20"
      >
        Entendi
      </button>
    </div>
  </div>
</div>
